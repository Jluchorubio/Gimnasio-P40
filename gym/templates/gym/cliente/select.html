{% extends "gym/cliente/base.html" %}

{% block title %}Seleccionar cliente{% endblock %}

{% block content %}
  <section class="page-header">
    <div>
      <h1 class="page-title">Seleccionar cliente</h1>
      <p class="page-subtitle">Elige el perfil con el que vas a navegar.</p>
    </div>
  </section>

  <div class="form-card">
    <form method="post">
      {% csrf_token %}
      <label class="form-field">
        Cliente
        <select id="cliente_id" name="cliente_id">
          <option value="">-- Selecciona --</option>
          {% for c in clientes %}
            <option value="{{ c.id }}">{{ c.nombre }} ({{ c.email }})</option>
          {% endfor %}
        </select>
      </label>
      <div class="class-actions">
        <button class="btn primary" type="submit">Entrar</button>
        <a class="btn ghost" href="/cliente.html">Volver</a>
      </div>
    </form>
  </div>
{% endblock %}
