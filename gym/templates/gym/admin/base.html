{% load static %}
<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Panel Admin{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'gym/css/panel.css' %}" />
  </head>
  <body>
    <header class="card">
      <div class="row between">
        <strong>Panel Admin</strong>
        <nav>
          <a href="/admin.html">Inicio</a>
          <a href="/index/">Web</a>
          <a href="/roles/">Roles</a>
        </nav>
      </div>
    </header>

    {% if messages %}
    <ul class="messages">
      {% for message in messages %}
      <li>{{ message }}</li>
      {% endfor %}
    </ul>
    {% endif %}

    {% block content %}{% endblock %}
  </body>
</html>
