{% extends "gym/trainer/base.html" %}

{% block title %}Seleccionar trainer | FITKIT{% endblock %}

{% block content %}
  <section class="page-header">
    <div>
      <h1 class="page-title">Seleccionar trainer</h1>
      <p class="page-subtitle">Elige el entrenador con el que vas a trabajar.</p>
    </div>
  </section>

  <div class="form-card">
    <form method="post">
      {% csrf_token %}
      <label class="form-field">
        Entrenador
        <select id="trainer_id" name="trainer_id">
          <option value="">-- Selecciona --</option>
          {% for t in trainers %}
            <option value="{{ t.id }}">{{ t.nombre }} ({{ t.email }})</option>
          {% endfor %}
        </select>
      </label>
      <div class="class-actions">
        <button class="btn primary" type="submit">Entrar</button>
        <a class="btn ghost" href="/trainer.html">Volver</a>
      </div>
    </form>
  </div>
{% endblock %}
