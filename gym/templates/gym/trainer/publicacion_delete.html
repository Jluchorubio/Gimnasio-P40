{% extends "gym/trainer/base.html" %}

{% block title %}Eliminar publicacion{% endblock %}

{% block content %}
  <div class="card">
    <h1 style="margin-top:0;">Eliminar publicacion</h1>
    <p>¿Seguro que deseas eliminar esta publicacion?</p>
    <p><strong>{{ publicacion.titulo }}</strong></p>
    <form method="post">
      {% csrf_token %}
      <div class="row">
        <button class="btn danger" type="submit">Eliminar</button>
        <a class="btn secondary" href="{% url 'trainer_publicaciones_list' pk=publicacion.clase.pk %}">Cancelar</a>
      </div>
    </form>
  </div>
{% endblock %}
