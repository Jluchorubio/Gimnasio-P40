<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Panel Entrenador{% endblock %}</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 2rem;
        max-width: 1100px;
      }
      .card {
        border: 1px solid #ddd;
        border-radius: 10px;
        padding: 1.25rem;
        background: #f8fafc;
        margin-bottom: 1.25rem;
      }
      nav a {
        margin-right: 0.75rem;
        text-decoration: none;
        color: #0f172a;
        font-weight: 600;
      }
      .row {
        display: flex;
        gap: 0.75rem;
        flex-wrap: wrap;
        align-items: center;
      }
      .btn {
        display: inline-block;
        padding: 0.5rem 0.9rem;
        border-radius: 6px;
        background: #0f172a;
        color: #fff;
        text-decoration: none;
        border: none;
        cursor: pointer;
      }
      .btn.secondary {
        background: #334155;
      }
      .btn.danger {
        background: #b91c1c;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th,
      td {
        border-bottom: 1px solid #e2e8f0;
        padding: 0.5rem;
        text-align: left;
      }
      th {
        background: #e2e8f0;
      }
      .messages {
        list-style: none;
        padding: 0;
      }
      .messages li {
        background: #dcfce7;
        border: 1px solid #bbf7d0;
        color: #166534;
        padding: 0.5rem 0.75rem;
        border-radius: 6px;
        margin-bottom: 0.5rem;
      }
    </style>
  </head>
  <body>
    <header class="card">
      <div class="row" style="justify-content: space-between;">
        <strong>Panel Entrenador</strong>
        <nav>
          <a href="/trainer.html">Inicio</a>
          <a href="/trainer/clases/">Mis clases</a>
          <a href="/index/">Web</a>
        </nav>
      </div>
      {% if trainer %}
      <p><strong>Entrenador:</strong> {{ trainer.nombre }} ({{ trainer.email }})</p>
      {% else %}
      <p><a href="/trainer/seleccionar/">Seleccionar entrenador</a></p>
      {% endif %}
    </header>

    {% if messages %}
    <ul class="messages">
      {% for message in messages %}
      <li>{{ message }}</li>
      {% endfor %}
    </ul>
    {% endif %}

    {% block content %}{% endblock %}
  </body>
</html>
